name: Deploy CloudBase Relay

on:
  push:
    branches:
      - main
      - master
    paths:
      - "cloudbase/functions/china-relay/**"
      - ".github/workflows/cloudbase.yml"
  workflow_dispatch:

jobs:
  deploy-china-relay:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate relay function package
        shell: bash
        run: |
          set -euo pipefail

          function_dir="cloudbase/functions/china-relay"
          bootstrap_file="${function_dir}/scf_bootstrap"

          test -f "${function_dir}/index.js"
          test -f "${function_dir}/package.json"

          printf '%s\n' \
            '#!/bin/bash' \
            'set -euo pipefail' \
            '' \
            'node index.js' > "${bootstrap_file}"
          chmod +x "${bootstrap_file}"
          test -x "${bootstrap_file}"

      - name: Deploy relay function
        shell: bash
        env:
          TENCENT_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
          TENCENT_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
          CLOUDBASE_ENV_ID: ${{ secrets.CLOUDBASE_ENV_ID }}
        run: |
          set -euo pipefail
          test -n "$TENCENT_SECRET_ID"
          test -n "$TENCENT_SECRET_KEY"
          test -n "$CLOUDBASE_ENV_ID"
          npx -y --package @cloudbase/cli@3.5.9 tcb login --apiKeyId "$TENCENT_SECRET_ID" --apiKey "$TENCENT_SECRET_KEY"
          npx -y --package @cloudbase/cli@3.5.9 tcb fn deploy china-relay --dir cloudbase/functions/china-relay --httpFn --force --yes --env-id "$CLOUDBASE_ENV_ID"
