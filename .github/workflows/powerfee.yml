name: Power Fee Monitor

on:
  workflow_dispatch:

concurrency:
  group: powerfee-monitor
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Trigger balance check
        shell: bash
        env:
          POWERFEE_CRON_URL: ${{ secrets.POWERFEE_CRON_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail

          cron_base="$(printf '%s' "${POWERFEE_CRON_URL}" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"

          if [ -z "${cron_base}" ]; then
            echo "POWERFEE_CRON_URL is required."
            exit 1
          fi

          if [ -z "${CRON_SECRET}" ]; then
            echo "CRON_SECRET is required."
            exit 1
          fi

          case "${cron_base}" in
            http://*|https://*) ;;
            //*) cron_base="https:${cron_base}" ;;
            *) cron_base="https://${cron_base}" ;;
          esac

          cron_base="${cron_base%/}"
          case "${cron_base}" in
            */powerfee/cron) cron_base="${cron_base%/powerfee/cron}" ;;
          esac
          cron_url="${cron_base}/powerfee/cron"

          curl --fail --silent --show-error --location --max-time 25 --retry 2 --retry-delay 5 \
            --request GET "${cron_url}" \
            --header "Authorization: Bearer ${CRON_SECRET}"
